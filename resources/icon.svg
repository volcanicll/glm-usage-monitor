<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient1)"/>

  <!-- Chart bars -->
  <rect x="100" y="320" width="60" height="120" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="180" y="260" width="60" height="180" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="260" y="200" width="60" height="240" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="340" y="150" width="60" height="290" rx="8" fill="#ffffff" opacity="0.9"/>

  <!-- Trend line -->
  <path d="M 80 360 Q 180 340 256 240 T 440 120"
        stroke="url(#gradient2)"
        stroke-width="12"
        fill="none"
        stroke-linecap="round"/>

  <!-- Data points -->
  <circle cx="130" cy="340" r="10" fill="#ffffff"/>
  <circle cx="210" cy="290" r="10" fill="#ffffff"/>
  <circle cx="290" cy="220" r="10" fill="#ffffff"/>
  <circle cx="370" cy="160" r="10" fill="#ffffff"/>
</svg>
